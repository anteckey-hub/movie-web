<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>🎬 Movie Player</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #0f172a;
    color: white;
}

header {
    text-align: center;
    padding: 20px;
    font-size: 28px;
    background: #1e293b;
}

.container {
    display: flex;
    height: calc(100vh - 80px);
}

.sidebar {
    width: 30%;
    background: #020617;
    overflow-y: auto;
    padding: 10px;
}

.movie {
    padding: 12px;
    margin: 10px 0;
    background: #1e293b;
    cursor: pointer;
    border-radius: 10px;
    transition: 0.2s;
}

.movie:hover {
    background: #334155;
}

.player {
    width: 70%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
}

iframe {
    width: 90%;
    height: 80%;
    border: none;
    border-radius: 10px;
}
</style>

</head>
<body>

<header>🎬 เว็บดูหนัง</header>

<div class="container">
    
    <!-- รายชื่อหนัง -->
    <div class="sidebar" id="movieList"></div>

    <!-- ตัวเล่น -->
    <div class="player">
        <iframe id="player" src=""></iframe>
    </div>

</div>

<script>
// 📌 เพิ่มหนังตรงนี้
const movies = [
    {
        name: "Avengers Endgame",
        url: "https://video.zig.ht/api/videos/file/1775521313737-589858113.mp4"
    },
    {
        name: "Fast & Furious",
        url: "https://www.youtube.com/embed/uisBaTkQAEs"
    },
    {
        name: "Spider-Man",
        url: "https://www.youtube.com/embed/t06RUxPbp_c"
    }
];

// โหลดรายการหนัง
const movieList = document.getElementById("movieList");
const player = document.getElementById("player");

movies.forEach(movie => {
    const div = document.createElement("div");
    div.className = "movie";
    div.innerText = movie.name;

    div.onclick = () => {
        player.src = movie.url;
    };

    movieList.appendChild(div);
});
</script>

</body>
</html>
